# CI configuration for testing Rust conversion
# For use with GitHub Actions, CircleCI, or similar

name: Test Rust Conversion

on:
  push:
    paths:
      - 'android/jni/rust/**'
      - 'ios/rust/**'
      - 'native/mob_nif/**'
  pull_request:
    paths:
      - 'android/jni/rust/**'
      - 'ios/rust/**'
      - 'native/mob_nif/**'

jobs:
  test-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android
          rustup target add i686-linux-android

      - name: Run Android unit tests
        working-directory: android/jni/rust
        run: |
          cargo test --lib -- --nocapture
          cargo test --test driver_tab_android_test -- --nocapture
          cargo test --test mob_beam_test -- --nocapture

      - name: Build Android libraries (simulator)
        working-directory: android/jni/rust
        run: |
          chmod +x build_android.sh
          ./build_android.sh
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/ndk-bundle

      - name: Verify Android symbols
        run: |
          if [ -f android/jni/rust/target/x86_64-linux-android/release/libmob_beam.so ]; then
            nm -D android/jni/rust/target/x86_64-linux-android/release/libmob_beam.so | grep -q "mob_start_beam"
            echo "✓ Android symbols verified"
          else
            echo "⚠ Android library not built (NDK not available)"
          fi

  test-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install iOS targets
        run: |
          rustup target add aarch64-apple-ios
          rustup target add aarch64-apple-ios-sim
          rustup target add x86_64-apple-ios

      - name: Run iOS unit tests
        working-directory: ios/rust
        run: |
          cargo test --lib -- --nocapture
          cargo test --test driver_tab_ios_test -- --nocapture
          cargo test --test mob_beam_ios_test -- --nocapture

      - name: Build iOS libraries
        working-directory: ios/rust
        run: |
          chmod +x build_ios.sh
          ./build_ios.sh

      - name: Verify iOS symbols
        run: |
          if [ -f ios/rust/target/aarch64-apple-ios/release/libmob_beam_ios.a ]; then
            nm ios/rust/target/aarch64-apple-ios/release/libmob_beam_ios.a | grep -q "mob_start_beam"
            echo "✓ iOS symbols verified"
          else
            echo "✗ iOS library not built"
            exit 1
          fi

      - name: Create universal library
        run: |
          if [ -f ios/rust/target/aarch64-apple-ios-sim/release/libmob_beam_ios.a ] && \
             [ -f ios/rust/target/x86_64-apple-ios/release/libmob_beam_ios.a ]; then
            mkdir -p ios/Frameworks
            lipo -create \
              ios/rust/target/aarch64-apple-ios-sim/release/libmob_beam_ios.a \
              ios/rust/target/x86_64-apple-ios/release/libmob_beam_ios.a \
              -output ios/Frameworks/libmob_beam_ios_simulator.a
            echo "✓ Universal simulator library created"
          else
            echo "⚠ Simulator libraries not available"
          fi

  test-mob-nif:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Run mob_nif tests
        working-directory: native/mob_nif
        run: |
          cargo test -- --nocapture

      - name: Build mob_nif
        working-directory: native/mob_nif
        run: |
          cargo build --release

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          override: true

      - name: Run rustfmt
        run: |
          cd android/jni/rust && cargo fmt -- --check
          cd ios/rust && cargo fmt -- --check
          cd native/mob_nif && cargo fmt -- --check

      - name: Run clippy
        run: |
          cd android/jni/rust && cargo clippy -- -D warnings
          cd ios/rust && cargo clippy -- -D warnings
          cd native/mob_nif && cargo clippy -- -D warnings
