# CI configuration for testing Rust conversion
# For use with GitHub Actions, CircleCI, or similar

name: Test Rust Conversion

on:
  push:
    paths:
      - "android/jni/rust/**"
      - "ios/rust/**"
      - "native/dala_nif/**"
  pull_request:
    paths:
      - "android/jni/rust/**"
      - "ios/rust/**"
      - "native/dala_nif/**"

jobs:
  test-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Verify Android targets
        run: rustup target list --installed

      - name: Run Android unit tests
        working-directory: android/jni/rust
        run: |
          cargo test --lib -- --nocapture
          cargo test --test driver_tab_android_test -- --nocapture
          cargo test --test dala_beam_test -- --nocapture

      - name: Build Android libraries (simulator)
        working-directory: android/jni/rust
        run: |
          chmod +x build_android.sh
          ./build_android.sh
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/ndk-bundle

      - name: Verify Android symbols
        run: |
          if [ -f android/jni/rust/target/x86_64-linux-android/release/libdala_beam.so ]; then
            nm -D android/jni/rust/target/x86_64-linux-android/release/libdala_beam.so | grep -q "dala_start_beam"
            echo "✓ Android symbols verified"
          else
            echo "⚠ Android library not built (NDK not available)"
          fi

  test-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Verify iOS targets
        run: rustup target list --installed

      - name: Run iOS unit tests
        working-directory: ios/rust
        run: |
          cargo test --lib -- --nocapture
          cargo test --test driver_tab_ios_test -- --nocapture
          cargo test --test dala_beam_ios_test -- --nocapture

      - name: Build iOS libraries
        working-directory: ios/rust
        run: |
          chmod +x build_ios.sh
          ./build_ios.sh

      - name: Verify iOS symbols
        run: |
          if [ -f ios/rust/target/aarch64-apple-ios/release/libdala_beam_ios.a ]; then
            nm ios/rust/target/aarch64-apple-ios/release/libdala_beam_ios.a | grep -q "dala_start_beam"
            echo "✓ iOS symbols verified"
          else
            echo "✗ iOS library not built"
            exit 1
          fi

      - name: Create universal library
        run: |
          if [ -f ios/rust/target/aarch64-apple-ios-sim/release/libdala_beam_ios.a ] && \
             [ -f ios/rust/target/x86_64-apple-ios/release/libdala_beam_ios.a ]; then
            mkdir -p ios/Frameworks
            lipo -create \
              ios/rust/target/aarch64-apple-ios-sim/release/libdala_beam_ios.a \
              ios/rust/target/x86_64-apple-ios/release/libdala_beam_ios.a \
              -output ios/Frameworks/libdala_beam_ios_simulator.a
            echo "✓ Universal simulator library created"
          else
            echo "⚠ Simulator libraries not available"
          fi

  test-dala-nif:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run dala_nif tests
        working-directory: native/dala_nif
        run: |
          cargo test -- --nocapture

      - name: Build dala_nif
        working-directory: native/dala_nif
        run: |
          cargo build --release

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Run rustfmt
        run: |
          cd android/jni/rust && cargo fmt -- --check
          cd ios/rust && cargo fmt -- --check
          cd native/dala_nif && cargo fmt -- --check

      - name: Run clippy
        run: |
          cd android/jni/rust && cargo clippy -- -D warnings
          cd ios/rust && cargo clippy -- -D warnings
          cd native/dala_nif && cargo clippy -- -D warnings
